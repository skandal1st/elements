version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: license-server-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-license_server}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-licenses}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - license-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-license_server}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: license-server-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - license-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # License Server
  license-server:
    build: .
    container_name: license-server
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-license_server}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-licenses}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    ports:
      - "${PORT:-8001}:8001"
    networks:
      - license-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  license-network:
    name: license-server-network
    driver: bridge

volumes:
  postgres_data:
    name: license-server-postgres-data
  redis_data:
    name: license-server-redis-data
